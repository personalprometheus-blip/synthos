# Synthos Mosquitto configuration — telemetry plane broker
# Created 2026-05-04 as part of Tier 4 of the distributed-trader migration.
#
# Deploy to: /etc/mosquitto/conf.d/synthos.conf on the process node (pi5).
# Mosquitto picks up files in conf.d/ automatically; do not edit
# /etc/mosquitto/mosquitto.conf — keep our overrides isolated here so
# upstream package updates don't blow them away.
#
# After dropping this file in place:
#   1. sudo mosquitto_passwd -c /etc/mosquitto/passwd synthos_broker
#      (you'll be prompted for the password — generate with `openssl rand -base64 24`
#       and store the same value in MQTT_PASS in user/.env)
#   2. sudo chown mosquitto:mosquitto /etc/mosquitto/passwd
#   3. sudo chmod 600 /etc/mosquitto/passwd
#   4. sudo systemctl enable --now mosquitto
#   5. Verify: mosquitto_sub -h 10.0.0.11 -u synthos_broker -P "$MQTT_PASS" -t '#' -v

# ── Listener ──────────────────────────────────────────────────────────────
# LAN-only bind (no external exposure). The broker MUST NOT be reachable
# from the internet — there is no TLS configured here on purpose; security
# is enforced by network isolation (Cloudflare tunnel does not forward to
# this port) plus username/password auth.
listener 1883 0.0.0.0
protocol mqtt

# ── Authentication ────────────────────────────────────────────────────────
allow_anonymous false
password_file /etc/mosquitto/passwd

# ── Persistence ───────────────────────────────────────────────────────────
# `persistence true` and `persistence_location /var/lib/mosquitto/` are
# already set by the default /etc/mosquitto/mosquitto.conf — declaring
# them again here would error with "Duplicate ... value in configuration"
# at startup. We only override the autosave knobs (default is 1800s,
# which is too coarse for our retained-price use case). The 30s window
# keeps SD-card writes modest while ensuring a broker restart loses at
# most ~30s of retained messages.
autosave_interval 30
autosave_on_changes false

# ── Connection limits ─────────────────────────────────────────────────────
# Conservative caps; far above expected load (3 retail nodes + portal +
# sentiment + auditor + watchdog ≈ 10 active clients). max_connections is
# per-listener in mosquitto 2.x but accepted as a global default.
max_queued_messages 1000

# ── Keep-alive ────────────────────────────────────────────────────────────
# In mosquitto 2.x there is no global keepalive_interval; each client
# negotiates its own interval at CONNECT time (paho default = 60s, set
# explicitly in our mqtt_client.py). Dead-client detection happens within
# 1.5× that interval per the MQTT spec, plus LWT auto-publishes when the
# broker decides a client is dead.

# ── Logging ──────────────────────────────────────────────────────────────
# log_type notice is plenty in steady state; flip to information when
# debugging connection issues. Log destination defaults to syslog on
# Debian — view via `journalctl -u mosquitto -f`.
log_type notice
log_type warning
log_type error
connection_messages true
log_timestamp true

# Override /usr/lib/systemd/journald.conf.d/40-rpi-volatile-storage.conf.
# The Raspberry Pi OS default forces Storage=volatile to protect the
# SD card from journal-induced write wear.  This node migrated to NVMe
# 2026-04-18 (synthos_build/docs/pi5_nvme_migration.md), so the SD-wear
# protection is obsolete and we want persistent journals to survive
# reboots for post-incident forensics.
[Journal]
Storage=persistent
